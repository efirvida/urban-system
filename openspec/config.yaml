# Project-wide SDD conventions. Per-phase knobs are below.
strict_tdd: false  # disabled: no test runner present; enable when one is added.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Note any new tooling or dependencies the change introduces
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Delta specs MUST be self-contained (full updated requirement block)
  design:
    - Document architecture decisions with rationale (ADR-style)
    - Include sequence diagrams for complex flows
    - Preserve existing module boundaries: src/{app,components,lib,types,utils}
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Pair every implementation task with a test task when strict_tdd is on
  apply:
    tdd: false
    test_command: ""           # populate when a test runner is added
    follow_existing_patterns: true
  verify:
    test_command: ""           # populate when a test runner is added
    build_command: "next build"
    lint_command: "next lint"
    typecheck_command: "tsc --noEmit"
    coverage_threshold: 0      # populate when coverage tool is added
  archive:
    - Warn before merging destructive deltas

