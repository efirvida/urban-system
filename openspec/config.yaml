# openspec/config.yaml
# SDD bootstrap for project: urban-system
# Generated by sdd-init on 2026-06-17 (hybrid mode: openspec + engram).

schema: spec-driven

context: |
  Project: urban-system (vrp-solver) — Multi-day Vehicle Routing Problem solver.
  Stack: Next.js 14.2 (App Router) + React 18 + TypeScript strict + Tailwind 3.4 + MapLibre GL 4.5.
  Architecture: SPA. Client uploads .ods/.xlsx (xlsx), server-side heuristic + NSGA-II optimizer over Geoapify/OSRM/Haversine distance matrix.
  Existing components: FileUpload, ConfigPanel, DataEditor, ColumnMapper, LocationMapEditor, MapView, RouteMap, ResultsPanel, OptimizeProgress, Sidebar, OptimizeButton.
  Existing API routes: /api/optimize (POST), /api/optimize/config, /api/routing (POST).
  Solver modules: haversine, routerOptimizer, nsga2, geneticOptimizer, parser, routing, googleRouting, geoapifyMatrix, clientRouting.
  Testing: vitest + jsdom + vite-tsconfig-paths. Test command: `npm run test:run`. Smoke coverage for filterUnreachable, matGet, runNSGA2. strict_tdd disabled.
  Tooling: ESLint (next lint), TypeScript strict (tsc --noEmit), Prettier (prettier --check).
  Git: initialized, remote = https://github.com/efirvida/urban-system.git.
  Existing changes: openspec/changes/vrp-solver (proposal + spec + design + tasks) — preserved as-is.
  Language (artifacts): English (default).

# Project-wide SDD conventions. Per-phase knobs are below.
strict_tdd: false  # disabled: test runner is now present, but the project is still in coverage-on-demand mode.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Note any new tooling or dependencies the change introduces
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Delta specs MUST be self-contained (full updated requirement block)
  design:
    - Document architecture decisions with rationale (ADR-style)
    - Include sequence diagrams for complex flows
    - Preserve existing module boundaries: src/{app,components,lib,types,utils}
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Pair every implementation task with a test task when strict_tdd is on
  apply:
    tdd: false
    test_command: "npm run test:run"
    follow_existing_patterns: true
  verify:
    test_command: "npm run test:run"
    build_command: "next build"
    lint_command: "next lint"
    typecheck_command: "tsc --noEmit"
    coverage_threshold: 0      # populate when coverage tool is added
  archive:
    - Warn before merging destructive deltas

